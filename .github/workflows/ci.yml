# CI disabled — does not run on push/PR.
# Re-enable by restoring `on.push` / `on.pull_request` when ready.
name: CI

on:
  workflow_dispatch:

jobs:
  test:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check hexapod_kinematics tests
      - name: Mypy (soft)
        run: mypy hexapod_kinematics --ignore-missing-imports
        continue-on-error: true
      - name: Pytest
        run: pytest -m "not kompas"
